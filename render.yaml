databases:
  - name: hikeit-db
    plan: free
    databaseName: hikeit
    user: hikeit

services:
  - type: web
    name: hikeit-backend
    plan: free
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hikeit-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://hikeit-frontend.onrender.com

  - type: web
    name: hikeit-frontend
    plan: free
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://hikeit-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
