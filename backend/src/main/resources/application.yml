spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/vrhiput
    username: vrhiput
    password: vrhiput123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: 8080

app:
  upload-dir: ./uploads
  cors:
    allowed-origins: http://localhost:5173
